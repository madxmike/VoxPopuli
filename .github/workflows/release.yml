name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            os-name: linux
          - os: macos-latest
            rid: osx-arm64
            os-name: macos
          - os: windows-latest
            rid: win-x64
            os-name: windows

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev \
            libibus-1.0-dev libudev-dev libvulkan-dev libwayland-dev libdecor-0-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ matrix.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ matrix.os }}-

      - name: Cache native libs
        id: cache-native
        uses: actions/cache@v4
        with:
          path: |
            native/install/
            obj/native/
          key: native-${{ matrix.os }}-sdl-${{ hashFiles('native/SDL/**') }}-shadercross-${{ hashFiles('native/SDL_shadercross/**') }}

      - name: Publish
        run: dotnet publish -c Release --self-contained true -r ${{ matrix.rid }} -o publish/ -p:SkipShaderCompilation=true

      - name: Zip artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: zip -r VoxPopuli-${{ github.ref_name }}-${{ matrix.os-name }}.zip publish/

      - name: Zip artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path publish/ -DestinationPath VoxPopuli-${{ github.ref_name }}-${{ matrix.os-name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxPopuli-${{ github.ref_name }}-${{ matrix.os-name }}
          path: VoxPopuli-${{ github.ref_name }}-${{ matrix.os-name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'

      - name: Create Release (nightly)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          files: '*.zip'
